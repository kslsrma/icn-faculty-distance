<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICN Faculty Distance Calculator</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #222; }
  h1 { font-size: 1.4em; }
  .campus { font-size: 0.85em; color: #666; margin-bottom: 20px; }
  input { width: 100%; padding: 10px; font-size: 1em; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
  button { margin-top: 10px; padding: 10px 20px; font-size: 1em; background: #FF6B21; color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:disabled { background: #999; }
  .results { margin-top: 25px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 12px; border-bottom: 1px solid #eee; }
  .row .icon { width: 64px; height: 64px; flex-shrink: 0; background: #FFF5EF; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .row .icon svg { width: 50px; height: 50px; }
  .row .info { flex: 1; }
  .row strong { color: #FF6B21; font-size: 1.1em; }
  .resolved { margin-top: 15px; font-size: 0.85em; color: #666; font-style: italic; }
  .error { color: #b00; margin-top: 15px; }
</style>
</head>
<body>

<h1>ICN Faculty Distance Calculator</h1>
<div class="campus">Straight-line distance from a faculty address to each ICN campus.</div>

<input id="addr" type="text" placeholder="Postal code or full address (e.g. 54000 Nancy or 10 rue de Rivoli, Paris)" />
<button id="go">Calculate</button>

<div id="out"></div>

<script>
// Inline SVG icons — no network dependency
const ICON_NANCY = `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Golden gate of Place Stanislas -->
  <rect x="6" y="54" width="52" height="4" fill="#8B6914"/>
  <!-- Left pillar -->
  <rect x="10" y="20" width="6" height="36" fill="#D4A017"/>
  <rect x="9" y="18" width="8" height="3" fill="#B8860B"/>
  <!-- Right pillar -->
  <rect x="48" y="20" width="6" height="36" fill="#D4A017"/>
  <rect x="47" y="18" width="8" height="3" fill="#B8860B"/>
  <!-- Gate arch -->
  <path d="M 16 30 Q 32 10 48 30 L 48 56 L 16 56 Z" fill="none" stroke="#D4A017" stroke-width="2"/>
  <!-- Decorative bars -->
  <line x1="22" y1="30" x2="22" y2="56" stroke="#D4A017" stroke-width="1.5"/>
  <line x1="28" y1="25" x2="28" y2="56" stroke="#D4A017" stroke-width="1.5"/>
  <line x1="32" y1="22" x2="32" y2="56" stroke="#D4A017" stroke-width="1.5"/>
  <line x1="36" y1="25" x2="36" y2="56" stroke="#D4A017" stroke-width="1.5"/>
  <line x1="42" y1="30" x2="42" y2="56" stroke="#D4A017" stroke-width="1.5"/>
  <!-- Crown on top -->
  <path d="M 26 18 L 28 12 L 32 16 L 36 12 L 38 18 Z" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
</svg>`;

const ICON_PARIS = `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Eiffel Tower -->
  <rect x="6" y="56" width="52" height="2" fill="#555"/>
  <!-- Base legs -->
  <path d="M 14 56 L 26 30 L 38 30 L 50 56" fill="none" stroke="#4A4A4A" stroke-width="2.5"/>
  <!-- Arch between legs -->
  <path d="M 18 50 Q 32 42 46 50" fill="none" stroke="#4A4A4A" stroke-width="1.5"/>
  <!-- First platform -->
  <rect x="22" y="28" width="20" height="3" fill="#4A4A4A"/>
  <!-- Middle section -->
  <path d="M 24 28 L 28 14 L 36 14 L 40 28" fill="none" stroke="#4A4A4A" stroke-width="2"/>
  <!-- Second platform -->
  <rect x="26" y="12" width="12" height="2" fill="#4A4A4A"/>
  <!-- Top section -->
  <path d="M 28 12 L 32 4 L 36 12" fill="none" stroke="#4A4A4A" stroke-width="2"/>
  <!-- Antenna -->
  <line x1="32" y1="4" x2="32" y2="1" stroke="#4A4A4A" stroke-width="1.5"/>
  <!-- Cross bracing -->
  <line x1="26" y1="44" x2="38" y2="44" stroke="#4A4A4A" stroke-width="1"/>
  <line x1="27" y1="36" x2="37" y2="36" stroke="#4A4A4A" stroke-width="1"/>
</svg>`;

const ICON_BERLIN = `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Brandenburg Gate -->
  <rect x="4" y="56" width="56" height="2" fill="#888"/>
  <!-- Main structure -->
  <rect x="8" y="22" width="48" height="34" fill="#D8D4C8"/>
  <!-- Top entablature -->
  <rect x="6" y="18" width="52" height="5" fill="#B8B4A8"/>
  <!-- 6 columns creating 5 passages -->
  <rect x="11" y="26" width="4" height="30" fill="#E8E4D8"/>
  <rect x="19" y="26" width="4" height="30" fill="#E8E4D8"/>
  <rect x="27" y="26" width="4" height="30" fill="#E8E4D8"/>
  <rect x="33" y="26" width="4" height="30" fill="#E8E4D8"/>
  <rect x="41" y="26" width="4" height="30" fill="#E8E4D8"/>
  <rect x="49" y="26" width="4" height="30" fill="#E8E4D8"/>
  <!-- Quadriga (chariot) on top -->
  <rect x="26" y="10" width="12" height="8" fill="#8B7355"/>
  <circle cx="28" cy="16" r="1.5" fill="#5C4A2E"/>
  <circle cx="36" cy="16" r="1.5" fill="#5C4A2E"/>
  <!-- Horse heads silhouette -->
  <path d="M 26 10 L 24 6 L 26 8 M 30 10 L 28 6 L 30 8 M 34 10 L 32 6 L 34 8 M 38 10 L 36 6 L 38 8" stroke="#5C4A2E" stroke-width="1.5" fill="none"/>
</svg>`;

const CAMPUSES = [
  { name: "Nancy",  addr: "2 Place de Padoue, 54000 Nancy",          lat: 48.6921, lon: 6.1844,  icon: ICON_NANCY  },
  { name: "Paris",  addr: "76 Route de la Demi-Lune, 92800 Puteaux", lat: 48.8785, lon: 2.2395,  icon: ICON_PARIS  },
  { name: "Berlin", addr: "Alt-Moabit 96, 10559 Berlin",              lat: 52.5255, lon: 13.3419, icon: ICON_BERLIN }
];

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function geocode(q) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`;
  const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  const data = await res.json();
  if (!data.length) throw new Error("Address not found. Try adding city or country.");
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name };
}

document.getElementById('go').addEventListener('click', async () => {
  const q = document.getElementById('addr').value.trim();
  const out = document.getElementById('out');
  if (!q) { out.innerHTML = '<div class="error">Please enter an address or postal code.</div>'; return; }
  const btn = document.getElementById('go');
  btn.disabled = true; btn.textContent = 'Looking up...';
  out.innerHTML = '';
  try {
    const loc = await geocode(q);
    let html = '<div class="results">';
    for (const c of CAMPUSES) {
      const km = haversine(loc.lat, loc.lon, c.lat, c.lon);
      html += `<div class="row"><div class="icon">${c.icon}</div><div class="info">${c.name}<br><small style="color:#888">${c.addr}</small></div><strong>${km.toFixed(1)} km</strong></div>`;
    }
    html += `</div><div class="resolved">Resolved to: ${loc.display}</div>`;
    out.innerHTML = html;
  } catch (e) {
    out.innerHTML = `<div class="error">${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Calculate';
  }
});

document.getElementById('addr').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('go').click(); });
</script>

</body>
</html>
